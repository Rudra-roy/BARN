# Example PPO training config for the end-to-end policy (Track B).
algorithm: PPO
total_steps: 20000000
seed: 0

env:
  num_beams: 720
  max_speed: 2.0
  # Curriculum: start on open worlds, progress to dense/narrow ones.
  curriculum: [open, moderate, dense, narrow]

observation:
  version: v1              # keep in sync with barn_rl_runtime/observation.py
  downsample_beams: 720
  include_prev_action: true

reward:
  progress_weight: 1.0
  collision_penalty: -10.0
  goal_bonus: 10.0
  time_penalty: -0.001
  action_smoothness_weight: -0.01

ppo:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 4096
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0

export:
  format: onnx
  deterministic_inference: true
