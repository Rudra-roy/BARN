name: ci

# Builds and tests the custom navigation packages inside an official ROS 2
# Jazzy container. The BARN 2026 evaluator (ros2_ws/src/barn_eval) is NOT
# vendored and is intentionally absent here, so CI builds only our stacks.
# Gazebo / hardware-in-the-loop evaluation is out of scope for CI and is run
# manually inside the distrobox (see docs/setup/barn_2026_jazzy_distrobox.md).

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  colcon-build-test:
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build + test tooling
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            python3-rosdep \
            clang-format \
            python3-flake8

      - name: Resolve dependencies with rosdep
        shell: bash
        run: |
          set -euo pipefail
          source /opt/ros/jazzy/setup.bash
          rosdep update
          rosdep install --from-paths ros2_ws/src --ignore-src -y --rosdistro jazzy

      - name: colcon build
        shell: bash
        working-directory: ros2_ws
        run: |
          set -euo pipefail
          source /opt/ros/jazzy/setup.bash
          colcon build --symlink-install --event-handlers console_direct+

      - name: colcon test
        shell: bash
        working-directory: ros2_ws
        run: |
          set -euo pipefail
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          colcon test --event-handlers console_direct+
          colcon test-result --verbose

  python-metric-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax + metric self-test
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pyyaml jsonschema
          python3 -m py_compile evaluation/metrics/*.py
          # Metric parity self-test lives inside the module.
          python3 evaluation/metrics/barn2026_metric.py --selftest
          python3 evaluation/metrics/upstream_compat_metric.py --selftest
