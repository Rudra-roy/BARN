# Parameters for barn_dynamic_tracking/tracker_node (Track C).
tracker_node:
  ros__parameters:
    use_sim_time: true
    scan_topic: /barn/scan
    pose_topic: /barn/pose
    tracks_topic: /barn/tracks
    markers_topic: /barn/track_markers
    # Track coordinates are computed from /barn/pose, which robot_adapter
    # publishes drift-corrected in the 'map' frame — so tracks ARE in map, and
    # this must match the MPC planning_frame (map) or the MPC warns/misplaces.
    output_frame: map
    publish_rate_hz: 10.0
    cluster_distance_threshold: 0.3   # m
    association_gate_distance: 0.5     # m
    process_noise_q: 1.0               # m^2/s^3
    measurement_noise_r: 0.05          # m^2
    min_hits: 3                        # updates before a track is published
    max_misses: 5                      # consecutive misses before a track is dropped
