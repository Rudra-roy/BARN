# One global parameter set for all static BARN worlds. Do not add per-world tuning.
goal_adapter_node:
  ros__parameters:
    planning_frame: odom
    goal_topic: /barn/goal
    pose_topic: /barn/pose
    success_distance: 0.75
    feedback_period_s: 0.1

robot_adapter_node:
  ros__parameters:
    scan_topic: /front/scan
    odom_topic: platform/odom/filtered
    odom_frame: odom
    base_frame: base_link
    internal_scan_topic: /barn/scan
    internal_pose_topic: /barn/pose
    internal_odom_topic: /barn/odom
    safe_cmd_topic: /barn/cmd_safe
    cmd_vel_topic: /cmd_vel
    cmd_vel_type: twist_stamped
    cmd_vel_frame: base_link

mapping_node:
  ros__parameters:
    scan_topic: /barn/scan
    pose_topic: /barn/pose
    grid_topic: /barn/occupancy
    frame_id: odom
    resolution: 0.05
    width_m: 50.0
    height_m: 30.0
    publish_rate_hz: 15.0
    max_usable_range: 12.0
    log_odds_hit: 0.85
    log_odds_miss: -0.85
    log_odds_min: -4.0
    log_odds_max: 2.5

classical_mpc_node:
  ros__parameters:
    goal_topic: /barn/goal
    pose_topic: /barn/pose
    odom_topic: /barn/odom
    scan_topic: /barn/scan
    map_topic: /barn/occupancy
    cmd_topic: /barn/cmd_desired
    planning_frame: odom
    cmd_frame: base_link
    goal_tolerance: 0.70
    global_planner_budget_ms: 500.0
    unknown_cost_multiplier: 1.0
    heuristic_weight: 2.0
    distance_weight: 0.5
    clearance_weight: 1.5
    local_horizon_m: 6.0
    mpc_horizon: 10
    mpc_dt: 0.1
    obstacle_margin: 0.30
    max_obstacle_slack: 1.20
    max_speed: 4.0
    max_yaw_rate: 3.0
    max_accel: 5.0
    max_yaw_accel: 6.0
    max_lateral_accel: 3.0
    unknown_speed: 2.0
    mpc_deadline_ms: 35.0
    startup_creep_delay_s: 1.0
    startup_creep_speed: 0.25
    no_progress_timeout_s: 3.0
    max_recovery_attempts: 5

safety_node:
  ros__parameters:
    desired_topic: /barn/cmd_desired
    safe_topic: /barn/cmd_safe
    scan_topic: /barn/scan
    base_frame: base_link
    v_max: 4.5
    w_max: 3.0
    max_lin_accel: 5.0
    max_ang_accel: 6.0
    cmd_timeout_s: 0.4
    scan_timeout_s: 0.5
    watchdog_period_s: 0.05
    emergency_margin: 0.05
    shield_latency_s: 0.05
    braking_decel: 2.5
    shield_horizon_s: 0.0
