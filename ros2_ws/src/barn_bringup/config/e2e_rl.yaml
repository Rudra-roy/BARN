# Track B (end-to-end RL) parameters. rl_runtime_node replaces the goal-seeker
# and publishes directly to /barn/cmd_desired. With no model_path it is a no-op
# (zero motion) until a policy is trained and exported.

goal_adapter_node:
  ros__parameters:
    planning_frame: odom
    goal_topic: /barn/goal
    pose_topic: /barn/pose
    success_distance: 1.0
    feedback_period_s: 0.1

robot_adapter_node:
  ros__parameters:
    corrected_frame: odom   # no mapping/drift correction in this track
    scan_topic: /front/scan
    odom_topic: platform/odom/filtered
    odom_frame: odom
    base_frame: base_link
    internal_scan_topic: /barn/scan
    internal_pose_topic: /barn/pose
    safe_cmd_topic: /barn/cmd_safe
    cmd_vel_topic: /cmd_vel
    cmd_vel_type: twist_stamped
    cmd_vel_frame: base_link

rl_runtime_node:
  ros__parameters:
    goal_topic: /barn/goal
    pose_topic: /barn/pose
    scan_topic: /barn/scan
    cmd_topic: /barn/cmd_desired
    cmd_frame: base_link
    control_rate_hz: 20.0
    model_path: ""
    v_max: 2.0
    w_max: 1.5

safety_node:
  ros__parameters:
    desired_topic: /barn/cmd_desired
    safe_topic: /barn/cmd_safe
    scan_topic: /barn/scan
    v_max: 2.0
    w_max: 1.5
    max_lin_accel: 2.5
    max_ang_accel: 3.0
    cmd_timeout_s: 0.4
    scan_timeout_s: 0.5
    watchdog_period_s: 0.05
