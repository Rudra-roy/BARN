# Parameters for barn_mapping/mapping_node.
# Starting engineering choices (NOT challenge rules). Tune from profiling.
mapping_node:
  ros__parameters:
    use_sim_time: true
    scan_topic: /barn/scan
    pose_topic: /barn/pose
    grid_topic: /barn/occupancy
    frame_id: odom
    resolution: 0.05    # metres/cell
    width_m: 20.0
    height_m: 12.0
    publish_rate_hz: 5.0
